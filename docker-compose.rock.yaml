services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pw
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  flask-app:
      image: masterclasses-rock:01
      ports:
        - "8409:8000"
      env_file:
        - .env
      environment:
        - DATABASE_URL=postgresql://postgres:pw@db:5432/db
      depends_on:
        - db
volumes:
  postgres_data:
